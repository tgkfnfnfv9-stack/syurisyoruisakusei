<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>株式会社小林機械｜従業員ツール</title>
<style>
  :root{
    --orange:#f08200; --orange-d:#d46f00;
    --ink:#141414; --ink-soft:#2a2a2a;
    --paper:#ffffff; --bg:#f5f4f2; --line:#e4e0da; --mute:#6f6a63;
    --sans:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",system-ui,sans-serif;
    --mono:ui-monospace,"SF Mono","SFMono-Regular",Menlo,Consolas,monospace;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; }
  body{
    font-family:var(--sans); color:var(--ink); background:var(--bg);
    min-height:100vh; display:flex; flex-direction:column;
    -webkit-font-smoothing:antialiased;
  }
  /* --- ハザードストライプ（唯一のアクセント） --- */
  .stripe{ height:8px; background:repeating-linear-gradient(45deg,var(--ink) 0 13px,var(--orange) 13px 26px); }

  /* --- ヘッダー（黒い銘板） --- */
  header{
    background:var(--ink); color:#fff;
    padding:26px 22px calc(24px + env(safe-area-inset-bottom,0)) 22px;
    padding-top:calc(26px + env(safe-area-inset-top,0));
  }
  .eyebrow{
    font-family:var(--mono); font-size:11px; letter-spacing:.28em;
    color:var(--orange); text-transform:uppercase; margin:0 0 12px;
  }
  .brand{ display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
  .brand .co{ font-size:29px; font-weight:800; letter-spacing:-.01em; line-height:1.05; }
  .brand .en{ font-family:var(--mono); font-size:12px; letter-spacing:.18em; color:#9a938a; }
  .tag{ margin:14px 0 0; font-size:13px; color:#c9c3ba; line-height:1.7; }

  /* --- 本文：ツール盤 --- */
  main{ flex:1; width:100%; max-width:560px; margin:0 auto; padding:22px 18px 8px; }
  .board-label{
    font-family:var(--mono); font-size:11px; letter-spacing:.22em; color:var(--mute);
    text-transform:uppercase; margin:6px 2px 14px; display:flex; align-items:center; gap:10px;
  }
  .board-label::after{ content:""; flex:1; height:1px; background:var(--line); }

  .grid{ display:grid; gap:13px; }
  .tool{
    display:flex; align-items:center; gap:16px; text-decoration:none; color:inherit;
    background:var(--paper); border:1px solid var(--line); border-left:5px solid var(--orange);
    border-radius:14px; padding:18px 18px; min-height:84px;
    transition:transform .12s ease, border-color .12s ease, box-shadow .12s ease;
  }
  .tool:active{ transform:translateY(1px); }
  @media(hover:hover){ .tool:hover{ transform:translateY(-2px); border-color:var(--orange); box-shadow:0 8px 22px rgba(20,20,20,.10); } }
  .tool:focus-visible{ outline:3px solid var(--orange); outline-offset:2px; }

  .code{
    flex:none; width:52px; height:52px; border-radius:11px;
    background:var(--ink); color:#fff; display:grid; place-items:center;
    font-weight:800; font-size:19px; letter-spacing:.02em;
  }
  .tool .body{ flex:1; min-width:0; }
  .tool .name{ font-size:19px; font-weight:800; letter-spacing:-.01em; }
  .tool .desc{ margin-top:3px; font-size:12.5px; color:var(--mute); line-height:1.5; }
  .arrow{ flex:none; font-family:var(--mono); font-weight:700; font-size:20px; color:var(--orange); }

  /* --- フッター --- */
  footer{
    max-width:560px; margin:0 auto; width:100%;
    padding:22px 20px calc(28px + env(safe-area-inset-bottom,0));
    color:var(--mute); font-size:12px; line-height:1.85;
  }
  footer .biz{ border-top:1px solid var(--line); padding-top:18px; }
  footer .biz b{ color:var(--ink-soft); font-weight:700; }
  footer a{ color:var(--orange-d); font-family:var(--mono); font-weight:700; text-decoration:none; letter-spacing:.02em; }
  footer a:active{ opacity:.6; }
  footer .fine{ margin-top:12px; font-family:var(--mono); font-size:10.5px; letter-spacing:.06em; color:#a49d94; }

  @media (prefers-reduced-motion:reduce){ .tool{ transition:none; } }
</style>
</head>
<body>
  <div class="stripe" aria-hidden="true"></div>

  <header>
    <p class="eyebrow">Staff Tools ・ 従業員ツール</p>
    <div class="brand">
      <span class="co">株式会社 小林機械</span>
      <span class="en">KOBAYASHI&nbsp;KIKAI</span>
    </div>
    <p class="tag">現場・事務で使う作成ツールをまとめています。<br>スマホからそのまま作成してPDF保存できます。</p>
  </header>

  <main>
    <p class="board-label">作成ツール</p>
    <div class="grid">

      <a class="tool" href="見積書.html">
        <span class="code">見積</span>
        <span class="body">
          <span class="name">見積書</span>
          <span class="desc">拠点・距離・人員から見積書を作成し、PDFで保存</span>
        </span>
        <span class="arrow" aria-hidden="true">→</span>
      </a>

      <a class="tool" href="報告書メーカー.html">
        <span class="code">報告</span>
        <span class="body">
          <span class="name">報告書メーカー</span>
          <span class="desc">作業報告書を作成し、写真添付・PDFで保存</span>
        </span>
        <span class="arrow" aria-hidden="true">→</span>
      </a>

    </div>
  </main>

  <footer>
    <div class="biz">
      <b>事業内容</b><br>
      中古工作機械全般の買取・修理・オーバーホール、改造してからの再販売。外注修理も承ります。KBK系列に重量屋（重量物運搬）。
    </div>
    <div class="fine">
      <a href="https://www.kkmt.co.jp" target="_blank" rel="noopener">www.kkmt.co.jp</a> ・ © 株式会社小林機械
    </div>
  </footer>
</body>
</html>
